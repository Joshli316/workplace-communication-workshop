<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Apple Touch Icon — Workplace Communication Workshop</title>
<style>
  :root { --primary: #0c4a6e; --primary-dark: #082f49; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 360px; height: 360px; overflow: hidden; }
  body {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  body::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 30%, rgba(125,211,252,0.18) 0%, transparent 60%);
  }
  .icon {
    color: #f0f9ff; width: 220px; height: 220px;
    position: relative; z-index: 1;
    filter: drop-shadow(0 4px 18px rgba(0,0,0,0.35));
  }
</style>
</head>
<body>
  <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
  </svg>
</body>
</html>
